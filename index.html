<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SV加盟店管理ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0f3f8;--sur:#fff;--sur2:#f7f9fc;--sur3:#eef1f8;
  --bdr:#e4e8f0;--bdr2:#edf0f7;
  --ink:#0f1623;--ink2:#3d4760;--ink3:#8b93a8;
  --acc:#2563eb;--acc2:#eff4ff;
  --grn:#16a34a;--grn2:#f0fdf4;--grn3:#dcfce7;
  --amb:#c97c0a;--amb2:#fffbeb;
  --red:#dc2626;--red2:#fef2f2;
  --blue:#3b82f6;--blue2:#eff6ff;
  --sh:0 1px 3px rgba(0,0,0,.07);--sh2:0 8px 28px rgba(0,0,0,.12);
  --r:10px;--r2:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* SIDEBAR */
.sb{position:fixed;top:0;left:0;bottom:0;width:220px;background:#0f172a;color:#c8d0e0;display:flex;flex-direction:column;z-index:40;overflow-y:auto}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-t{font-family:'Outfit',sans-serif;font-size:14px;font-weight:900;letter-spacing:.1em;color:#fff;text-transform:uppercase}
.sb-logo-s{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px}
.sb-sec{padding:14px 0 4px}
.sb-sec-l{padding:0 18px 6px;font-size:9px;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.2);text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:12.5px;font-family:'Noto Sans JP',sans-serif;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s}
.sb-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.sb-btn.on{color:#fff;background:rgba(255,255,255,.08);border-left-color:#60a5fa}
.sv-nav{display:flex;align-items:center;gap:8px;padding:7px 18px;font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;transition:all .15s;border-radius:0}
.sv-nav:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04)}
.sv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07)}
.me-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border-radius:20px;padding:7px 12px}
.me-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.me-nm{font-size:12px;color:rgba(255,255,255,.8)}
.me-change{font-size:10px;color:rgba(255,255,255,.3);cursor:pointer;margin-left:auto;padding:2px 4px}
.me-change:hover{color:rgba(255,255,255,.7)}

/* MAIN */
.main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);height:54px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:var(--sh)}
.pg-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700}
.tb-r{display:flex;align-items:center;gap:8px}
.vtog{display:flex;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r2);padding:3px;gap:2px}
.vtb{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--ink3);transition:all .15s}
.vtb.on{background:var(--sur);color:var(--ink);box-shadow:var(--sh)}
.btn-p{display:flex;align-items:center;gap:6px;background:var(--acc);color:#fff;border:none;padding:7px 14px;border-radius:var(--r2);font-family:'Noto Sans JP',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-p:hover{background:#1d4ed8}
.icon-btn{width:32px;height:32px;border-radius:var(--r2);border:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);transition:all .15s}
.icon-btn:hover{border-color:var(--acc);color:var(--acc)}
.content{padding:22px;flex:1}

/* STATUS */
.sync-tag{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.sync-tag.ok{color:var(--grn);background:var(--grn2)}
.sync-tag.err{color:var(--red);background:var(--red2)}
.sync-tag.loading{color:var(--ink3);background:var(--sur2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--ink3);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETUP */
.setup-banner{background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:var(--r);padding:22px 26px;color:#fff;margin-bottom:20px}
.setup-ttl{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.setup-sub{font-size:12.5px;opacity:.8;margin-bottom:16px;line-height:1.7}
.setup-row{display:flex;gap:8px}
.setup-inp{flex:1;padding:9px 12px;border-radius:var(--r2);border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none}
.setup-inp::placeholder{color:rgba(255,255,255,.45)}
.setup-inp:focus{border-color:rgba(255,255,255,.8)}
.setup-go{padding:9px 20px;border-radius:var(--r2);border:none;background:#fff;color:#1e3a8a;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* SUMMARY CARDS */
.sum-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cb::before{background:var(--acc)}
.sc.cg::before{background:var(--grn)}
.sc.ca::before{background:var(--amb)}
.sc.cr::before{background:var(--red)}
.sc.cp::before{background:#7c3aed}
.sc-l{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--ink3);text-transform:uppercase;margin-bottom:6px}
.sc-v{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1}
.sc-s{font-size:11px;color:var(--ink3);margin-top:4px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.srch{flex:1;min-width:160px;position:relative}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.srch input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--bdr);border-radius:var(--r2);font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--sur);color:var(--ink);outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--acc)}
.sel{padding:8px 10px;border:1px solid var(--bdr);border-radius:var(--r2);font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--sur);color:var(--ink);outline:none;cursor:pointer}

/* STORE GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.c-head{padding:13px 15px 11px;border-bottom:1px solid var(--bdr2);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.c-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.c-meta{margin-top:4px}
.sv-tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:3px;color:#fff}
.pct-lg{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;text-align:right}
.pct-sm{font-size:10px;color:var(--ink3);text-align:right;margin-top:1px}

/* KPI */
.c-kpi{padding:11px 15px 10px;border-bottom:1px solid var(--bdr2)}
.kpi-row{display:flex;gap:10px;margin-bottom:8px}
.ki{flex:1}
.ki-l{font-size:9.5px;font-weight:700;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;margin-bottom:2px}
.ki-v{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;line-height:1}
.ki-s{font-size:10px;color:var(--ink3);margin-top:2px}
.prog{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.prog-row{display:flex;justify-content:space-between;margin-top:4px}
.prog-p{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700}
.prog-d{font-size:10.5px;color:var(--ink3)}

/* MIKOMI BOX */
.mikomi-box{margin-top:9px;padding:8px 10px;background:linear-gradient(135deg,#eff6ff,#ecfdf5);border:1px solid #bfdbfe;border-radius:6px}
.mikomi-hd{font-size:9.5px;font-weight:700;letter-spacing:.07em;color:#3b82f6;text-transform:uppercase;margin-bottom:5px}
.mikomi-row{display:flex;align-items:center;gap:10px}
.mikomi-main{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800}
.mikomi-pct{font-size:11.5px;font-weight:700;margin-left:3px}
.mikomi-sub{font-size:11px;color:var(--ink3);flex:1}
.mikomi-bar{height:3px;background:#dbeafe;border-radius:2px;overflow:hidden;margin-top:5px}
.mikomi-bar-f{height:100%;border-radius:2px;transition:width .7s}

/* TASKS */
.c-tasks{padding:10px 15px;border-bottom:1px solid var(--bdr2)}
.ct-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ct-ttl{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase}
.ct-edit{font-size:11px;color:var(--acc);cursor:pointer;font-weight:700;background:none;border:none;font-family:inherit;padding:0}

/* Text inputs inline */
.task-field{margin-bottom:7px}
.tf-label{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;margin-bottom:3px}
.tf-input{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:5px 8px;border:1px solid var(--bdr);border-radius:4px;background:var(--sur2);color:var(--ink);outline:none;transition:border-color .15s;resize:none}
.tf-input:focus{border-color:var(--acc);background:var(--sur)}
.tf-input.has-val{background:var(--blue2);border-color:#bfdbfe}

/* Checkbox style */
.chk-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.chk-row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:4px}
.chk-item{flex:1;display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:5px;border:1.5px solid var(--bdr);background:var(--sur2);cursor:pointer;transition:all .15s;user-select:none}
.chk-item:hover{border-color:var(--acc);background:var(--acc2)}
.chk-item.checked{border-color:var(--grn);background:var(--grn2)}
.chk-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--sur)}
.chk-item.checked .chk-box{background:var(--grn);border-color:var(--grn)}
.chk-lbl{font-size:11.5px;font-weight:600;color:var(--ink3)}
.chk-item.checked .chk-lbl{color:var(--grn)}

/* MEMO */
.c-memo{padding:10px 15px 13px}
.memo-l{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;margin-bottom:5px}
.memo-ta{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:6px 8px;border:1px solid var(--bdr);border-radius:4px;resize:none;min-height:52px;outline:none;background:var(--sur2);color:var(--ink);transition:border-color .15s;line-height:1.6}
.memo-ta:focus{border-color:var(--acc);background:var(--sur)}
.memo-ta.has-val{background:var(--blue2);border-color:#bfdbfe}
.save-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:5px}
.save-st{font-size:11px;color:var(--ink3)}
.save-btn{padding:4px 14px;border-radius:4px;border:none;background:var(--acc);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:none}
.save-btn:hover{background:#1d4ed8}

/* ═══ 見込み進捗タブ ═══ */
.mikomi-page{display:none}
.mp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.sv-progress-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.spc-head{padding:14px 16px 12px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:10px}
.spc-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.spc-info{flex:1}
.spc-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700}
.spc-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.spc-pct{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;text-align:right}
.spc-body{padding:12px 16px}
.spc-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.spc-ki{background:var(--sur2);border-radius:6px;padding:8px 10px}
.spc-ki-l{font-size:9.5px;font-weight:700;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;margin-bottom:3px}
.spc-ki-row{display:flex;align-items:baseline;gap:4px}
.spc-ki-v{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700}
.spc-ki-m{font-size:11px;color:var(--blue);font-weight:600}
.spc-ki-s{font-size:10px;color:var(--ink3);margin-top:1px}
.spc-prog{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:8px}
.spc-prog-f{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.spc-prog-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.spc-prog-l{font-size:10px;color:var(--ink3)}
.spc-prog-r{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700}

/* STORE MIKOMI TABLE */
.sm-table-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.sm-table-hd{padding:12px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.sm-table-ttl{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700}
.smt{width:100%;border-collapse:collapse}
.smt th{padding:9px 14px;text-align:right;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ink3);background:var(--sur2);border-bottom:1px solid var(--bdr);text-transform:uppercase;white-space:nowrap}
.smt th:first-child,.smt th:nth-child(2){text-align:left}
.smt td{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--bdr2);text-align:right;white-space:nowrap}
.smt td:first-child,.smt td:nth-child(2){text-align:left}
.smt tr:last-child td{border-bottom:none}
.smt tr:hover td{background:var(--sur2)}
.smt-nm{font-weight:600;display:flex;align-items:center;gap:6px}
.smt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.num{font-family:'Outfit',sans-serif;font-weight:600}
.pct-cell{font-family:'Outfit',sans-serif;font-weight:700}
.arr-up{color:var(--grn)}
.arr-dn{color:var(--red)}

/* TASK BOARD */
.tbd{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tbc{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:13px}
.tbc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tbc-ttl{font-size:11.5px;font-weight:700}
.tbc-ct{background:var(--sur);border-radius:10px;padding:1px 8px;font-size:10.5px;font-weight:700;color:var(--ink3)}
.tc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:10px 12px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.tc:hover{box-shadow:var(--sh2)}
.tc-ttl{font-size:12.5px;font-weight:600;margin-bottom:5px;line-height:1.4}
.tc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ttag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:3px}

/* SV TABLE */
.svt{width:100%;border-collapse:collapse;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.svt th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink3);background:var(--sur2);border-bottom:1px solid var(--bdr);text-transform:uppercase}
.svt td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--bdr2)}
.svt tr:last-child td{border-bottom:none}
.svt tr:hover td{background:var(--sur2)}

/* ERROR */
.err-box{background:var(--red2);border:1px solid #fecaca;border-radius:var(--r);padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--red);line-height:1.7}

/* CHART PAGE */
.chart-page{}
.chart-controls{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.chart-seg{display:flex;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r2);padding:3px;gap:2px}
.chart-seg-btn{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--ink3);transition:all .15s}
.chart-seg-btn.on{background:var(--sur);color:var(--ink);box-shadow:var(--sh)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.chart-card.wide{grid-column:1/-1}
.chart-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.chart-card-ttl{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700}
.chart-card-sub{font-size:11px;color:var(--ink3)}
.chart-wrap{position:relative;height:240px}
.chart-wrap.tall{height:320px}
.sv-bar-grid{display:grid;gap:10px}
.sv-bar-row{display:flex;align-items:center;gap:10px}
.sv-bar-nm{width:52px;font-size:12px;font-weight:600;flex-shrink:0;text-align:right}
.sv-bar-track{flex:1;height:28px;background:var(--sur2);border-radius:4px;overflow:hidden;position:relative}
.sv-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:#fff;min-width:36px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sv-bar-fill.mk{opacity:.5;position:absolute;top:0;left:0}
.sv-bar-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:700}
.sv-store-list{margin-top:14px;border-top:1px solid var(--bdr2);padding-top:10px}
.sv-store-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr2)}
.sv-store-item:last-child{border-bottom:none}
.sv-store-nm{flex:1;font-size:12px}
.sv-store-bar-wrap{width:120px;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.sv-store-bar{height:100%;border-radius:3px;transition:width .7s}
.sv-store-pct{width:44px;text-align:right;font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:700}

/* ALERT PAGE */
.alert-section{margin-bottom:22px}
.alert-section-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--bdr)}
.alert-section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-section-ttl{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700}
.alert-section-ct{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--sh);cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.alert-item:hover{box-shadow:var(--sh2);transform:translateX(2px)}
.alert-item.lv-red{border-left-color:var(--red)}
.alert-item.lv-amb{border-left-color:var(--amb)}
.alert-item.lv-blue{border-left-color:var(--blue)}
.alert-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.alert-icon.red{background:var(--red2)}
.alert-icon.amb{background:var(--amb2)}
.alert-icon.blue{background:var(--blue2)}
.alert-body{flex:1;min-width:0}
.alert-store{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:3px}
.alert-sv-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;color:#fff}
.alert-msg{font-size:12px;color:var(--ink2);line-height:1.6}
.alert-tag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:4px;margin-top:4px}
.alert-tag.red{background:var(--red2);color:var(--red)}
.alert-tag.amb{background:var(--amb2);color:var(--amb)}
.alert-tag.blue{background:var(--blue2);color:var(--blue)}
.alert-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:5px}
.alert-pct{font-family:'Outfit',sans-serif;font-size:13px;font-weight:800}
.alert-empty{text-align:center;padding:40px;color:var(--ink3)}
.alert-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.af-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--sur);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .15s}
.af-btn.on{border-color:var(--acc);background:var(--acc2);color:var(--acc)}
.alert-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.as-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 16px;box-shadow:var(--sh);text-align:center}
.as-card-v{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;line-height:1}
.as-card-l{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase;margin-top:5px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* TASK BOARD */
.tb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tb-stats{display:flex;gap:8px;flex-wrap:wrap}
.tb-stat{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid}
.tb-stat.all{border-color:var(--bdr);color:var(--ink2);background:var(--sur)}
.tb-stat.todo{border-color:#94a3b8;color:#64748b;background:#f1f5f9}
.tb-stat.doing{border-color:#f59e0b;color:#d97706;background:#fffbeb}
.tb-stat.done{border-color:var(--grn);color:var(--grn);background:rgba(34,197,94,.08)}
.tb-add-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:opacity .15s}
.tb-add-btn:hover{opacity:.85}
.store-section{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.store-sec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none}
.store-sec-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink1)}
.store-sec-badges{display:flex;gap:6px;align-items:center}
.store-sec-add{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1.5px solid var(--acc);border-radius:6px;background:var(--acc2);color:var(--acc);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.store-sec-add:hover{background:var(--acc);color:#fff}
.task-list{padding:0}
.task-row{display:grid;grid-template-columns:auto 90px 1fr auto 100px 90px 32px;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr2);transition:background .12s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--acc2)}
.pri-badge{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cat-badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:var(--acc2);color:var(--acc);white-space:nowrap}
.task-name-cell{font-size:12px;font-weight:600;color:var(--ink1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-memo{font-size:11px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-sel{padding:3px 6px;border-radius:6px;border:1.5px solid;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;background:transparent}
.status-sel.s-todo{border-color:#94a3b8;color:#64748b}
.status-sel.s-doing{border-color:#f59e0b;color:#d97706}
.status-sel.s-done{border-color:var(--grn);color:var(--grn)}
.done-date{font-size:10px;color:var(--ink3);text-align:right}
.task-edit-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bdr);border-radius:6px;background:var(--sur);cursor:pointer;color:var(--ink3);transition:all .15s;font-size:13px}
.task-edit-btn:hover{border-color:var(--acc);color:var(--acc)}
.task-del-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bdr);border-radius:6px;background:var(--sur);cursor:pointer;color:var(--ink3);transition:all .15s;font-size:13px}
.task-del-btn:hover{border-color:#ef4444;color:#ef4444}
.empty-tasks{padding:16px;text-align:center;font-size:12px;color:var(--ink3)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--sur);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--bdr)}
.modal-ttl{font-size:15px;font-weight:800;color:var(--ink1)}
.modal-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3);border-radius:6px}
.modal-close:hover{background:var(--bdr2)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.05em}
.form-inp{padding:8px 10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--ink1);background:var(--bg);transition:border-color .15s}
.form-inp:focus{outline:none;border-color:var(--acc)}
.form-inp.full{width:100%;box-sizing:border-box}
.form-textarea{resize:vertical;min-height:70px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border:1.5px solid var(--bdr);border-radius:8px;background:var(--sur);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--ink2)}
.btn-save{padding:8px 22px;border:none;border-radius:8px;background:var(--acc);color:#fff;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.btn-save:hover{opacity:.85}
.tb-no-store{padding:40px;text-align:center;color:var(--ink3);font-size:13px}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-logo">
    <div class="sb-logo-t">SV Portal</div>
    <div class="sb-logo-s">Franchise Management</div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-l">ナビゲーション</div>
    <button class="sb-btn on" id="nav-stores" onclick="showView('stores',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      加盟店一覧
    </button>
    <button class="sb-btn" id="nav-mikomi" onclick="showView('mikomi',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      見込み進捗
    </button>
    <button class="sb-btn" id="nav-tasks" onclick="showView('tasks',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      タスクボード
    </button>
    <button class="sb-btn" id="nav-sv" onclick="showView('sv',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      SV別集計
    </button>
    <button class="sb-btn" id="nav-chart" onclick="showView('chart',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12 L12 2"/><path d="M12 12 L20 6"/></svg>
      売上グラフ
    </button>
    <button class="sb-btn" id="nav-staff" onclick="showView('staff',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      スタッフランク
    </button>
    <button class="sb-btn" id="nav-report" onclick="showView('report',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      店舗レポート
    </button>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-l">SV担当</div>
    <div id="sb-svs"></div>
  </div>
  <div id="sb-alert-area" style="padding:10px 14px;display:none">
    <div style="background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:7px;padding:9px 12px">
      <div style="font-size:10px;font-weight:700;color:#fca5a5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px">⚠ アラート</div>
      <div id="sb-alert-list" style="display:flex;flex-direction:column;gap:4px"></div>
    </div>
  </div>
  <div class="sb-foot">
    <div class="me-chip">
      <div class="me-av" id="me-av">?</div>
      <span class="me-nm" id="me-nm">---</span>
      <span class="me-change" onclick="changeSV()">✎</span>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="pg-title" id="pg-title">加盟店一覧</div>
    <div class="tb-r">
      <div id="sync-ind"></div>
      <div class="vtog" id="vtog">
        <button class="vtb on" onclick="setMode('all',this)">全体</button>
        <button class="vtb" onclick="setMode('mine',this)">マイ担当</button>
      </div>
      <select class="sel" id="month-sel" onchange="selectMonth(this.value)"></select>
      <button class="icon-btn" onclick="loadData()" title="更新">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
let SVC={"山田":"#2563eb","髙橋":"#7c3aed","向井":"#0891b2","子龍":"#059669","宮脇":"#c2410c"};
const svc=sv=>SVC[sv]||"#6b7280";
const pcc=p=>p>=100?"var(--grn)":p>=80?"var(--amb)":"var(--red)";
const fk=n=>{n=n||0;if(n>=10000)return(n/10000).toFixed(1)+"万";return n.toLocaleString()};
const fm=n=>{n=n||0;if(n>=100000000)return(n/100000000).toFixed(1)+"億";if(n>=10000)return Math.round(n/10000)+"万";return n.toLocaleString()};

const DEFAULT_API_URL="https://script.google.com/macros/s/AKfycbz7yn-FAxTajCmNCAwZhkHF9yS_Z4h6Re3mEuscnSFYwHlxGv7SBQAJ0NHuqVwoNRdT/exec";
const stored_url=localStorage.getItem("gas_url");
// 古いURLが保存されていたら自動でリセット
if(stored_url&&stored_url!==DEFAULT_API_URL&&!stored_url.startsWith("http://localhost")){localStorage.removeItem("gas_url");}
let API_URL=localStorage.getItem("gas_url")||DEFAULT_API_URL;
let mySV=localStorage.getItem("my_sv")||"";
let mode="all";
let stores=[],tasks=[],staffRanks=[],staffSales=[];
let storesByYM={};
let selectedYM=0;
let curYM=0;
let availableMonths=[];
let curView="stores";

window.addEventListener("DOMContentLoaded",()=>{
  if(!mySV){mySV=prompt("SV名を入力（例: 山田、髙橋、向井、子龍、宮脇）")||"SV";localStorage.setItem("my_sv",mySV);}
  // 月変わり自動更新チェック
  const curMonth=new Date().toISOString().slice(0,7);
  const lastMonth=localStorage.getItem("last_month")||"";
  if(lastMonth && lastMonth!==curMonth){localStorage.removeItem("last_data_cache");}
  localStorage.setItem("last_month",curMonth);
  setUserUI();
  renderContent();
});

function setUserUI(){
  document.getElementById("me-nm").textContent=mySV;
  const av=document.getElementById("me-av");
  av.textContent=mySV[0];av.style.background=svc(mySV);
}
function changeSV(){const n=prompt("SV名を入力",mySV);if(n){mySV=n;localStorage.setItem("my_sv",n);setUserUI();render();}}

function renderContent(){
  const el=document.getElementById("content");
  if(!API_URL){
    el.innerHTML=`
      <div class="setup-banner">
        <div class="setup-ttl">🔗 Googleスプレッドシート API設定</div>
        <div class="setup-sub">GASをデプロイして発行されたURLを貼り付けてください。</div>
        <div class="setup-row">
          <input class="setup-inp" id="url-inp" placeholder="https://script.google.com/macros/s/.../exec">
          <button class="setup-go" onclick="setURL()">接続</button>
        </div>
      </div>`;
    return;
  }
  el.innerHTML=`
    <div class="sum-grid" id="sum"></div>
    <div id="v-stores">
      <div class="toolbar">
        <div class="srch"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="q" placeholder="店舗名・SV名で検索..." oninput="renderCards()">
        </div>
        <select class="sel" id="f-sv" onchange="renderCards()"><option value="">全SV</option></select>
        <select class="sel" id="f-pct" onchange="renderCards()">
          <option value="">達成状況：全て</option><option value="ok">達成（100%以上）</option>
          <option value="warn">注意（80〜99%）</option><option value="ng">未達（79%以下）</option>
        </select>
        <select class="sel" id="f-sort" onchange="renderCards()">
          <option value="sv">SV順</option><option value="pd">達成率：高い順</option>
          <option value="pa">達成率：低い順</option><option value="nm">店舗名順</option>
        </select>
      </div>
      <div class="sg" id="grid"></div>
    </div>
    <div id="v-mikomi" class="mikomi-page"></div>
    <div id="v-tasks" style="display:none"></div>
    <div id="v-sv" style="display:none"></div>
    <div id="v-chart" style="display:none"></div>
    <div id="v-staff" style="display:none"></div>
    <div id="v-report" style="display:none"></div>`;
  loadData();
}

function setURL(){
  const v=document.getElementById("url-inp").value.trim();
  if(!v.startsWith("https://script.google.com")){alert("正しいGASのURLを入力してください");return;}
  API_URL=v;localStorage.setItem("gas_url",v);renderContent();
}

async function loadData(){
  setSyncStatus("loading");
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    stores=data.stores||[];tasks=data.tasks||[];staffRanks=data.staffRanks||[];staffSales=data.staffSales||[];
    availableMonths=data.availableMonths||[];
    const now=new Date();
    curYM=now.getFullYear()*100+(now.getMonth()+1);
    if(!selectedYM||selectedYM===curYM){selectedYM=curYM;}
    storesByYM[curYM]=stores;
    if(data.config){
      if(data.config.svList&&data.config.svList.length){SVC={};data.config.svList.forEach(s=>{SVC[s.name]=s.color;});}
      if(data.config.taskCats&&data.config.taskCats.length){TASK_CATS=data.config.taskCats;}
    }
    setSyncStatus("ok");
    buildMonthSelect();initSelects();render();
  }catch(e){
    setSyncStatus("err");
    const g=document.getElementById("grid");
    if(g)g.innerHTML=`<div style="grid-column:1/-1"><div class="err-box">⚠ データ取得失敗: ${e.message}<br><a href="#" onclick="resetURL()" style="color:var(--acc)">URLを再設定</a></div></div>`;
  }
}
function resetURL(){API_URL="";localStorage.removeItem("gas_url");renderContent();}

function setSyncStatus(s){
  const el=document.getElementById("sync-ind");if(!el)return;
  if(s==="ok")el.innerHTML=`<div class="sync-tag ok"><div class="sync-dot"></div>同期中</div>`;
  else if(s==="err")el.innerHTML=`<div class="sync-tag err">⚠ エラー</div>`;
  else el.innerHTML=`<div class="sync-tag loading"><div class="spinner"></div></div>`;
}

function initSelects(){
  const svs=[...new Set(stores.map(s=>s.sv))].sort();
  document.getElementById("sb-svs").innerHTML=svs.map(sv=>
    `<div class="sv-nav" onclick="filterSV('${sv}')"><div class="sv-dot" style="background:${svc(sv)}"></div>${sv}（${stores.filter(s=>s.sv===sv).length}店）</div>`
  ).join("");
  const opts=svs.map(sv=>`<option value="${sv}">${sv}</option>`).join("");
  ["f-sv"].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=`<option value="">全SV</option>${opts}`;});
}

function render(){renderSum();renderCards();renderMikomi();renderTasks();renderSVTable();updateAlertBadge();}

function getStores(){const base=storesByYM[selectedYM]||stores;return mode==="mine"?base.filter(s=>s.sv===mySV):base;}
function ymLabel(ym){const y=Math.floor(ym/100);const m=ym%100;return y+"年"+m+"月";}
function buildMonthSelect(){
  const el=document.getElementById("month-sel");if(!el)return;
  const months=availableMonths.length?availableMonths:[curYM];
  el.innerHTML=months.map(ym=>`<option value="${ym}"${ym===selectedYM?" selected":""}>${ymLabel(ym)}</option>`).join("");
}
async function selectMonth(ym){
  ym=parseInt(ym);
  selectedYM=ym;
  if(storesByYM[ym]){render();return;}
  setSyncStatus("loading");
  try{
    const res=await fetch(API_URL+"?action=getStores&ym="+ym);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    storesByYM[ym]=data.stores||[];
    setSyncStatus("ok");render();
  }catch(e){setSyncStatus("err");alert("データ取得失敗: "+e.message);}
}

// ─ SUMMARY ─
function renderSum(){
  const el=document.getElementById("sum");if(!el)return;
  const d=getStores();
  const tgt=d.reduce((a,s)=>a+(s.売上目標||0),0);
  const act=d.reduce((a,s)=>a+(s.実績売上||0),0);
  const mk=d.reduce((a,s)=>a+(s.見込み売上||0),0);
  const p=tgt?Math.round(act/tgt*100):0;
  const mp=tgt?Math.round(mk/tgt*100):0;
  const ok=d.filter(s=>(s.達成率||0)>=100).length;
  const need=tasks.filter(t=>t.sv===mySV&&(!t.スタッフMTG||!t.オーナーMTG)).length;
  const royMkTotal=d.reduce((a,s)=>a+(s.見込みロイヤリティ||0),0);
  const royTgtTotal=d.reduce((a,s)=>a+(s.ロイヤリティ目標||0),0);
  const royMkPct=royTgtTotal?Math.round(royMkTotal/royTgtTotal*100):0;
  el.innerHTML=[
    {l:"管理店舗",v:d.length+"店",s:mode==="mine"?mySV+"担当":"全SV合計",c:"cb"},
    {l:"売上達成率",v:p+"%",s:"¥"+fm(act)+" / ¥"+fm(tgt),c:pcc(p).replace("var(--","c").replace(")","")},
    {l:"月末見込み達成率",v:mp+"%",s:"見込み¥"+fm(mk),c:"cp"},
    {l:"ロイヤリティ見込み",v:"¥"+fm(royMkTotal),s:royMkPct+"% / 目標 ¥"+fm(royTgtTotal),c:pcc(royMkPct).replace("var(--","c").replace(")","")},
    {l:"達成店舗",v:ok+"店",s:"全"+d.length+"店中",c:"cg"},
    {l:"要対応MTG",v:need+"件",s:mySV+"担当",c:"ca"},
  ].map(c=>`<div class="sc ${c.c}"><div class="sc-l">${c.l}</div><div class="sc-v">${c.v}</div><div class="sc-s">${c.s}</div></div>`).join("");
}

// ─ STORE CARDS ─
function renderCards(){
  const el=document.getElementById("grid");if(!el)return;
  let d=getStores();
  const q=(document.getElementById("q")||{}).value||"";
  const fsv=(document.getElementById("f-sv")||{}).value||"";
  const fp=(document.getElementById("f-pct")||{}).value||"";
  const fs=(document.getElementById("f-sort")||{}).value||"sv";
  if(q)d=d.filter(s=>s.name.includes(q)||s.sv.includes(q));
  if(fsv)d=d.filter(s=>s.sv===fsv);
  if(fp==="ok")d=d.filter(s=>(s.達成率||0)>=100);
  if(fp==="warn")d=d.filter(s=>(s.達成率||0)>=80&&(s.達成率||0)<100);
  if(fp==="ng")d=d.filter(s=>(s.達成率||0)<80);
  if(fs==="pd")d.sort((a,b)=>(b.達成率||0)-(a.達成率||0));
  if(fs==="pa")d.sort((a,b)=>(a.達成率||0)-(b.達成率||0));
  if(fs==="nm")d.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
  if(!d.length){el.innerHTML='<div style="padding:40px;color:var(--ink3)">該当する店舗がありません</div>';return;}
  window._storeIndexMap={};
  d.forEach((s,i)=>{window._storeIndexMap[s.name]="s"+i;});
  el.innerHTML=d.map((s,i)=>storeCard(s,i)).join("");
}

      <div class="ki"><div class="ki-l">客単価</div><div class="ki-v">${s.客単価実績?Math.round(s.客単価実績).toLocaleString():"—"}<span style="font-size:10px;color:var(--ink3)">円</span></div><div class="ki-s">目標 ${s.客単価目標>0?Math.round(s.客単価目標).toLocaleString():"—"}円</div></div>

    <div class="kpi-row" style="margin-top:8px">

    </div>

            <div class="spc-ki-l">月末見込み</div>

            <div class="spc-ki-s">見込達成率 ${mp}%</div>
          </div>
          <div class="spc-ki">
            <div class="spc-ki-l">実績達成率</div>
            <div class="spc-ki-row"><div class="spc-ki-v" style="color:${pc}">${p}%</div></div>
            <div class="spc-ki-s">達成${ok} / 未達${d.length-ok}店</div>

          <div class="spc-ki">
            <div class="spc-ki-l">平均見込率</div>
            <div class="spc-ki-row"><div class="spc-ki-v" style="color:${pcc(avgMk)}">${Math.round(avgMk)}%</div></div>
            <div class="spc-ki-s">店舗平均</div>
          </div>
        </div>
        <div class="spc-prog"><div class="spc-prog-f" style="width:${Math.min(mp,100)}%;background:${mpc}"></div></div>
        <div class="spc-prog-row"><span class="spc-prog-l">見込み達成率</span><span class="spc-prog-r" style="color:${mpc}">${mp}%</span></div>

    const sv=mkSvEl.value;
    const rows=stores.filter(s=>!sv||s.sv===sv).sort((a,b)=>(b.見込み達成率||0)-(a.見込み達成率||0));
    el.querySelector("tbody").innerHTML=rows.map(s=>{
      const mp=s.見込み達成率||0;const mpc=pcc(mp);

      const arrow=diff>0?`<span class="arr-up">▲${diff.toFixed(1)}</span>`:`<span class="arr-dn">▼${Math.abs(diff).toFixed(1)}</span>`;

        <td>${s.sv}</td><td class="num">¥${fk(s.実績売上)}</td>
        <td class="pct-cell" style="color:${pcc(s.達成率||0)}">${s.達成率||"—"}%</td>
        <td class="num">¥${fk(s.見込み売上)}</td><td class="pct-cell" style="color:${mpc}">${mp||"—"}%</td>

        <td>${arrow}</td></tr>`;
    }).join("");
  };
}

// ─ TASK BOARD (NEW) ─
let TASK_CATS=["集客","教育","店舗運営","数値管理","MTG","HP/SNS","その他"];
const TASK_STATUS=["未着手","進行中","完了"];
const TASK_PRI=["高","中","低"];
const PRI_COLOR={高:"#ef4444",中:"#f59e0b",低:"#94a3b8"};
const STS_CLS={未着手:"s-todo",進行中:"s-doing",完了:"s-done"};

function renderTasks(){
  const el=document.getElementById("v-tasks");if(!el)return;
  const allStores=mode==="mine"?stores.filter(s=>s.sv===mySV):stores;
  const storeNames=new Set(allStores.map(s=>s.name));
  const svs=[...new Set(allStores.map(s=>s.sv))].sort();
  const fq=(document.getElementById("tb-q")||{}).value||"";
  const fsv=(document.getElementById("tb-sv")||{}).value||"";
  const fcat=(document.getElementById("tb-cat")||{}).value||"";
  const fsts=(document.getElementById("tb-sts")||{}).value||"";
  const fpri=(document.getElementById("tb-pri")||{}).value||"";

  // フィルタ適用
  let visTasks=tasks.filter(t=>{
    if(!storeNames.has(t.store))return false;
    if(fsv&&t.sv!==fsv)return false;
    if(fq&&!t.store.includes(fq)&&!t.taskName.includes(fq))return false;
    if(fcat&&t.category!==fcat)return false;
    if(fsts&&t.status!==fsts)return false;
    if(fpri&&t.priority!==fpri)return false;
    return true;
  });

  const total=visTasks.length;
  const todo=visTasks.filter(t=>t.status==="未着手").length;
  const doing=visTasks.filter(t=>t.status==="進行中").length;
  const done=visTasks.filter(t=>t.status==="完了").length;

  // カテゴリ順
  const catOrder=TASK_CATS;
  const usedCats=[...new Set(visTasks.map(t=>t.category||"その他"))].sort((a,b)=>{
    const ai=catOrder.indexOf(a),bi=catOrder.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });

  const catSections=usedCats.map(cat=>{
    const catTasks=visTasks.filter(t=>(t.category||"その他")===cat);
    const doneN=catTasks.filter(t=>t.status==="完了").length;
    const catColors={集客:"#3b82f6",教育:"#8b5cf6",店舗運営:"#f59e0b",数値管理:"#10b981",MTG:"#ef4444","HP/SNS":"#06b6d4",その他:"#94a3b8"};
    const cc=catColors[cat]||"#6b7280";

    const taskRows=catTasks.map(t=>{
      const priC=PRI_COLOR[t.priority]||"#94a3b8";
      const stsC=STS_CLS[t.status]||"s-todo";
      const opts=TASK_STATUS.map(v=>`<option value="${v}" ${t.status===v?"selected":""}>${v}</option>`).join("");
      const tn=t.taskName.replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const memo=(t.memo||"").replace(/</g,"&lt;");
      const sv=t.sv||"";
      const sn=t.store.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      const storeInfo=stores.find(s=>s.name===t.store);
      const pct=storeInfo?storeInfo.達成率??0:0;
      return `<div class="task-row" data-row="${t.row}">
        <div class="pri-badge" style="background:${priC}" title="${t.priority}優先度"></div>
        <div style="min-width:90px">
          <div style="font-size:12px;font-weight:600;color:var(--ink)">${t.store}</div>
          <div style="font-size:10px;color:var(--ink3)">${sv} <span style="color:${pcc(pct)};font-weight:600">${pct}%</span></div>
        </div>
        <div style="flex:1">
          <div class="task-name-cell" title="${tn}">${tn}</div>
          ${memo?`<div class="task-memo">${memo}</div>`:""}
        </div>
        <div style="font-size:10px;color:var(--ink3)">${t.doneDate||""}</div>
        <select class="status-sel ${stsC}" onchange="changeStatus(${t.row},this.value,this)">${opts}</select>
        <div style="display:flex;gap:4px">
          <button class="task-edit-btn" onclick="openTaskModal('${sn}',${t.row})" title="編集">✏️</button>
          <button class="task-del-btn" onclick="deleteTask(${t.row},'${sn}')" title="削除">🗑</button>
        </div>
      </div>`;
    }).join("");

    return `<div class="store-section" data-cat="${cat}">
      <div class="store-sec-head">
        <div class="store-sec-name">
          <div style="width:9px;height:9px;border-radius:50%;background:${cc};flex-shrink:0"></div>
          <span style="font-size:14px;font-weight:700">${cat}</span>
          <span style="font-size:11px;color:var(--ink3)">${catTasks.length}件（完了${doneN}）</span>
        </div>
        <button class="store-sec-add" onclick="openTaskModal('',0)">＋ タスク追加</button>
      </div>
      <div class="task-list">${taskRows}</div>
    </div>`;
  }).join("");

  el.innerHTML=`
    <div class="tb-header">
      <div class="tb-stats">
        <span class="tb-stat all">全${total}件</span>
        <span class="tb-stat todo">未着手 ${todo}</span>
        <span class="tb-stat doing">進行中 ${doing}</span>
        <span class="tb-stat done">完了 ${done}</span>
      </div>
      <button class="tb-add-btn" onclick="openTaskModal('',0)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        タスクを追加
      </button>
    </div>
    <div class="toolbar" style="flex-wrap:wrap;gap:6px;margin-bottom:14px">
      <div class="srch"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="tb-q" placeholder="店舗名・タスク名で検索..." oninput="renderTasks()" value="${fq}">
      </div>
      <select class="sel" id="tb-sv" onchange="renderTasks()">
        <option value="">全SV</option>${svs.map(v=>`<option value="${v}"${fsv===v?" selected":""}>${v}</option>`).join("")}
      </select>
      <select class="sel" id="tb-cat" onchange="renderTasks()">
        <option value="">全カテゴリ</option>${TASK_CATS.map(v=>`<option value="${v}"${fcat===v?" selected":""}>${v}</option>`).join("")}
      </select>
      <select class="sel" id="tb-sts" onchange="renderTasks()">
        <option value="">全ステータス</option>${TASK_STATUS.map(v=>`<option value="${v}"${fsts===v?" selected":""}>${v}</option>`).join("")}
      </select>
      <select class="sel" id="tb-pri" onchange="renderTasks()">
        <option value="">全優先度</option>${TASK_PRI.map(v=>`<option value="${v}"${fpri===v?" selected":""}>${v}</option>`).join("")}
      </select>
    </div>
    ${catSections||`<div class="tb-no-store">該当するタスクがありません</div>`}`;
}

function _taskRowHTML(idx,defaultStore,defaultSV){

async function generateAgenda(storeName){
  const fmt=document.querySelector("input[name='agenda-fmt']:checked")?.value||"doc";
  const memo=document.getElementById("agenda-memo")?.value||"";
  closeAgendaModal();
  // ポップアップブロック対策：ユーザー操作の直後にウィンドウを開いておく
  const win=window.open("","_blank");
  if(win)win.document.write('<p style="font-family:sans-serif;padding:40px">アジェンダを生成中です。しばらくお待ちください...</p>');
  const loadEl=document.createElement("div");
  loadEl.id="agenda-loading";
  loadEl.style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center";
  loadEl.innerHTML=`<div style="background:var(--sur);padding:24px 32px;border-radius:12px;text-align:center;color:var(--ink)"><div style="font-size:24px;margin-bottom:12px">⏳</div><div style="font-weight:600;margin-bottom:4px">アジェンダを生成中...</div><div style="font-size:12px;color:var(--ink3)">Googleドライブに保存しています（10〜30秒）</div></div>`;
  document.body.appendChild(loadEl);
  try{
    const url=API_URL+"?action=createAgendaExternal&store="+encodeURIComponent(storeName)+"&format="+fmt+"&memo="+encodeURIComponent(memo);
    const res=await fetch(url);
    const data=await res.json();
    document.getElementById("agenda-loading")?.remove();
    if(!data.ok||!data.url)throw new Error(data.error||"生成失敗");
    if(win)win.location.href=data.url;
    else window.open(data.url,"_blank");
  }catch(e){
    document.getElementById("agenda-loading")?.remove();
    if(win)win.close();
    alert("エラー: "+e.message);
  }
}

async function saveTaskModal(){
  if(_editRow>0){
    // 編集モード
    const store=document.getElementById("m-store")?.value||"";
    const sv=document.getElementById("m-sv")?.value||"";
    if(!store){alert("店舗名は必須です");return;}
    const taskName=document.getElementById("m-task")?.value?.trim()||"";
    if(!taskName){alert("タスク名は必須です");return;}
    const task={
      store, sv,
      category:document.getElementById("m-cat")?.value||"",
      taskName, status:document.getElementById("m-sts")?.value||"未着手",
      priority:document.getElementById("m-pri")?.value||"中",
      memo:document.getElementById("m-memo")?.value||"",
      doneDate:document.getElementById("m-done")?.value||"",
    };
    closeModal();
    try{
      const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"upsertTask",row:_editRow,task})});
      const j=await res.json();
      if(j.ok){const idx=tasks.findIndex(t=>t.row===_editRow);if(idx>=0)tasks[idx]={...task,row:_editRow};renderTasks();renderSum();}
      else alert("保存失敗: "+(j.error||""));
    }catch(e){alert("通信エラー: "+e.message);}
  } else {
    // 追加モード（複数）各行から店舗を個別に読む
    const taskEls=document.querySelectorAll("[id^='mtr-task-']");
    const taskList=[];
    for(const el of taskEls){
      const idx=el.id.replace("mtr-task-","");
      const tn=el.value.trim();
      if(!tn)continue;
      const store=document.getElementById("mtr-store-"+idx)?.value||"";
      if(!store)continue;
      taskList.push({
        store,
        sv:document.getElementById("mtr-sv-"+idx)?.value||"",
        category:document.getElementById("mtr-cat-"+idx)?.value||"",
        taskName:tn,
        status:document.getElementById("mtr-sts-"+idx)?.value||"未着手",
        priority:document.getElementById("mtr-pri-"+idx)?.value||"中",
        memo:document.getElementById("mtr-memo-"+idx)?.value||"",
        doneDate:"",
      });
    }
    if(!taskList.length){alert("タスク名を1件以上入力してください");return;}
    closeModal();
    try{
      const results=await Promise.all(taskList.map(task=>
        fetch(API_URL,{method:"POST",body:JSON.stringify({action:"upsertTask",row:0,task})}).then(r=>r.json())
      ));
      results.forEach((j,i)=>{if(j.ok)tasks.push({...taskList[i],row:j.row||Date.now()+i});});
      renderTasks();renderSum();
    }catch(e){alert("通信エラー: "+e.message);}
  }
}

async function changeStatus(row,newStatus,sel){
  const t=tasks.find(t=>t.row===row);
  if(!t)return;
  const oldStatus=t.status;
  t.status=newStatus;
  if(newStatus==="完了")t.doneDate=new Date().toISOString().slice(0,10);
  else t.doneDate="";
  sel.className="status-sel "+(STS_CLS[newStatus]||"s-todo");
  try{
    await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"upsertTask",row,task:{status:newStatus,doneDate:t.doneDate}})});
    // 完了日を即時表示更新
    const rowEl=sel.closest(".task-row");
    if(rowEl){const dd=rowEl.querySelector("div:nth-child(4)");if(dd)dd.textContent=t.doneDate||"";}
    renderSum();
  }catch(e){t.status=oldStatus;sel.value=oldStatus;console.warn("status save failed",e);}
}

async function deleteTask(row,storeName){
  if(!confirm("このタスクを削除しますか？"))return;
  try{
    await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"deleteTask",row})});
    tasks=tasks.filter(t=>t.row!==row);
    renderTasks();renderSum();
  }catch(e){alert("削除失敗: "+e.message);}
}

async function postTask(store,taskData){
  if(!API_URL)return;
  const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"upsertTask",row:0,task:{store,...taskData}})});
  const j=await res.json();
  if(!j.ok&&j.error)throw new Error(j.error);
}

function renderSVTable(){
  const el=document.getElementById("v-sv");if(!el)return;
  const svs=[...new Set(stores.map(s=>s.sv))].sort();
  const rows=svs.map(sv=>{
    const d=stores.filter(s=>s.sv===sv);
    const tgt=d.reduce((a,s)=>a+(s.売上目標||0),0);
    const act=d.reduce((a,s)=>a+(s.実績売上||0),0);
    const mk=d.reduce((a,s)=>a+(s.見込み売上||0),0);
    const p=tgt?Math.round(act/tgt*100):0;
    const mp=tgt?Math.round(mk/tgt*100):0;
    const ok=d.filter(s=>(s.達成率||0)>=100).length;
    const sva=d.reduce((a,s)=>a+(s.SV売上実績||0),0);
    const royal=d.reduce((a,s)=>a+(s.ロイヤリティ実績||0),0);
    const royalTgt=d.reduce((a,s)=>a+(s.ロイヤリティ目標||0),0);
    const royalMk=d.reduce((a,s)=>a+(s.見込みロイヤリティ||0),0);
    const royalPct=royalTgt?Math.round(royal/royalTgt*100):0;

      <td class="num" style="color:${pcc(mp)};font-weight:700">${mp}%</td>
      <td class="num">${ok} / ${d.length}</td>
      <td class="num"><div>¥${fm(royal)}<span style="font-size:11px;color:${pcc(royalPct)};font-weight:700;margin-left:5px">${royalPct}%</span></div><div style="font-size:10.5px;color:var(--ink3)">目標 ¥${fm(royalTgt)}</div></td>
      <td class="num" style="background:var(--acc2)"><div style="font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;color:${pcc(royalMkPct)}">¥${fm(royalMk)}</div><div style="font-size:11px;font-weight:700;color:${pcc(royalMkPct)}">${royalMkPct}%</div><div style="font-size:10px;color:var(--ink3)">目標比</div></td>
    </tr>`;
  });
  const T=stores.reduce((a,s)=>a+(s.売上目標||0),0),A=stores.reduce((a,s)=>a+(s.実績売上||0),0),MK=stores.reduce((a,s)=>a+(s.見込み売上||0),0);
  const P=T?Math.round(A/T*100):0,MP=T?Math.round(MK/T*100):0;
  const totRoyal=stores.reduce((a,s)=>a+(s.ロイヤリティ実績||0),0);
  const totRoyalTgt=stores.reduce((a,s)=>a+(s.ロイヤリティ目標||0),0);
  const totRoyalMk=stores.reduce((a,s)=>a+(s.見込みロイヤリティ||0),0);

  const totRoyalMkPct=totRoyalTgt?Math.round(totRoyalMk/totRoyalTgt*100):0;
  el.innerHTML=`<table class="svt">
    <thead><tr><th>SV</th><th>担当店舗</th><th>売上実績 / 目標</th><th>達成率</th><th>見込み達成率</th><th>達成店舗</th><th>ロイヤリティ実績（達成率）</th><th style="background:var(--acc2);color:var(--acc)">ロイヤリティ見込み（目標比）</th></tr></thead>

      <td>合計</td><td class="num">${stores.length}店</td>
      <td class="num">¥${fm(A)} / ¥${fm(T)}</td>
      <td class="num" style="color:${pcc(P)};font-weight:700">${P}%</td>

// ─ INLINE SAVE ─
const _saveTimers={};
function debounceSave(name,field,value,id){
  let t=tasks.find(t=>t.store===name);
  if(!t){t={sv:stores.find(s=>s.name===name)?.sv||"",store:name};tasks.push(t);}
  t[field]=value;
  const ssEl=document.getElementById("ss-"+id);
  if(ssEl){ssEl.className="save-status saving";ssEl.textContent="保存中...";}
  const key=name+"|"+field;
  clearTimeout(_saveTimers[key]);
  _saveTimers[key]=setTimeout(async()=>{
    try{
      await postTask(name,{[field]:value});
      if(ssEl){ssEl.className="save-status saved";ssEl.textContent="✓ 保存済み";setTimeout(()=>{ssEl.textContent="";},2000);}
    }catch(e){if(ssEl){ssEl.className="save-status";ssEl.textContent="⚠ 保存失敗";}}
    renderSum();
  },800);
}

async function autoSave(name,field,value){
  let t=tasks.find(t=>t.store===name);
  if(!t){t={sv:stores.find(s=>s.name===name)?.sv||"",store:name};tasks.push(t);}
  t[field]=value;
  try{await postTask(name,{[field]:value});}catch(e){console.warn("save failed",e);}
  renderSum();
}

async function toggleMTG(name,field,id){
  const CHK_IDS={ミニモ導入:"minimo",スタッフMTG:"smtg",オーナーMTG:"omtg",HPBミーティング:"hpb",店舗集計分析:"bunseki",LINE配信:"line",回数券POP共有:"kaisu"};
  const chkSvg='<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';
  let t=tasks.find(t=>t.store===name);
  if(!t){t={sv:stores.find(s=>s.name===name)?.sv||"",store:name};tasks.push(t);}
  t[field]=!t[field];
  const resolvedId=window._storeIndexMap&&window._storeIndexMap[name]||id;
  const eid="chk-"+(CHK_IDS[field]||"x")+"-"+resolvedId;
  const chkEl=document.getElementById(eid);
  if(chkEl){
    chkEl.className="chk-item"+(t[field]?" checked":"");
    chkEl.querySelector(".chk-box").innerHTML=t[field]?chkSvg:"";
  }
  // doneCountを更新
  const card=document.getElementById("tcard-"+resolvedId);
  if(card){
    const newDone=ALL_CHK.filter(({field:f})=>t[f]).length;
    card.dataset.done=newDone;
    const doneColor=newDone===ALL_CHK.length?"var(--grn)":newDone>0?"var(--amb)":"var(--ink3)";
    const numEl=card.querySelector(".c-head > div:last-child > div:first-child");
    if(numEl)numEl.style.color=doneColor;
  }
  const ssEl=document.getElementById("ss-"+resolvedId);
  if(ssEl){ssEl.className="save-status saving";ssEl.textContent="保存中...";}
  try{
    await postTask(name,{[field]:t[field]});
    if(ssEl){ssEl.className="save-status saved";ssEl.textContent="✓ 保存済み";setTimeout(()=>{ssEl.textContent="";},2000);}
  }catch(e){
    console.warn("save failed",e);
    if(ssEl){ssEl.className="save-status";ssEl.textContent="⚠ 保存失敗";}
  }
  renderSum();updateAlertBadge();
}

async function postTask(store,taskData){
  if(!API_URL)return;
  const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"updateTask",store,task:taskData})});
  const j=await res.json();
  if(!j.ok&&j.error)throw new Error(j.error);
}

function getItemRank(key, s) {
  if (key === "bussan")  return s.avgBussan  >= 90000  ? "松" : s.avgBussan  >= 30000 ? "竹" : "梅";
  if (key === "kaisu")   return s.avgKaisu   >= 11     ? "松" : s.avgKaisu   >= 5     ? "竹" : "梅";
  if (key === "option")  return s.avgOption  >= 45000  ? "松" : s.avgOption  >= 30000 ? "竹" : "梅";
  if (key === "shimei")  return s.avgShimei  >= 30     ? "松" : s.avgShimei  >= 10    ? "竹" : "梅";
  if (key === "gijutsu") return "梅"; // 技術面は常に改善余地あり
  return "梅";
}

// ── Canvas棒グラフ描画ユーティリティ ──
function drawBarChart(canvasId,{labels,datasets,maxVal,unit,horizontal}){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width=canvas.offsetWidth;
  const H=canvas.height=canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);

  const pad={t:28,r:16,b:horizontal?labels.length*24+16:40,l:horizontal?100:48};
  const cW=W-pad.l-pad.r;
  const cH=H-pad.t-pad.b;
  const n=labels.length;
  const ds=datasets.length;
  const groupW=cW/n;
  const barW=Math.min(groupW*0.7/ds,32);
  const gap=(groupW*0.7-barW*ds)/Math.max(ds-1,1);
  const maxV=maxVal||Math.max(...datasets.flatMap(d=>d.data))*1.15||1;

  // グリッド
  ctx.strokeStyle="#e4e8f0";ctx.lineWidth=1;
  for(let g=0;g<=4;g++){
    const y=pad.t+cH*(1-g/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    ctx.fillStyle="#8b93a8";ctx.font="10px 'Outfit',sans-serif";ctx.textAlign="right";
    ctx.fillText(Math.round(maxV*g/4)+(unit||""),pad.l-4,y+3);
  }

  // バー
  datasets.forEach((d,di)=>{
    labels.forEach((lbl,li)=>{
      const val=d.data[li]||0;
      const ratio=Math.min(val/maxV,1);
      const x=pad.l+li*groupW+groupW*0.15+di*(barW+gap);
      const bh=cH*ratio;
      const y=pad.t+cH-bh;
      ctx.fillStyle=d.colors?d.colors[li]:(d.color||"#60a5fa");
      ctx.beginPath();
      ctx.roundRect(x,y,barW,bh,3);
      ctx.fill();
    });
  });

  // Xラベル
  ctx.fillStyle="#3d4760";ctx.font="11px 'Noto Sans JP',sans-serif";ctx.textAlign="center";
  labels.forEach((lbl,li)=>{
    ctx.fillText(lbl,pad.l+li*groupW+groupW/2,pad.t+cH+14);
  });

  // 凡例
  let lx=pad.l;
  datasets.forEach((d,di)=>{
    const c=d.colors?d.colors[0]:d.color||"#60a5fa";
    ctx.fillStyle=c;
    ctx.fillRect(lx,6,10,10);
    ctx.fillStyle="#3d4760";ctx.font="10px 'Noto Sans JP',sans-serif";ctx.textAlign="left";
    ctx.fillText(d.label,lx+13,15);
    lx+=ctx.measureText(d.label).width+30;
  });
}

function drawHBarChart(canvasId,{labels,datasets,maxVal,unit}){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width=canvas.offsetWidth;
  const rowH=Math.max(22, Math.floor((canvas.offsetHeight-30)/Math.max(labels.length,1)));
  const H=canvas.height=rowH*labels.length+50;
  ctx.clearRect(0,0,W,H);

  const pad={t:24,r:60,b:16,l:90};
  const cW=W-pad.l-pad.r;
  const n=labels.length;
  const ds=datasets.length;
  const barH=Math.min(rowH*0.35,14);
  const maxV=maxVal||Math.max(...datasets.flatMap(d=>d.data))*1.1||1;

  // 縦グリッド
  ctx.strokeStyle="#e4e8f0";ctx.lineWidth=1;
  for(let g=0;g<=4;g++){
    const x=pad.l+cW*g/4;
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+n*rowH);ctx.stroke();
    ctx.fillStyle="#8b93a8";ctx.font="9px 'Outfit',sans-serif";ctx.textAlign="center";
    ctx.fillText(Math.round(maxV*g/4)+(unit||""),x,pad.t-6);
  }

  // バー
  labels.forEach((lbl,li)=>{
    const rowY=pad.t+li*rowH;
    // ラベル
    ctx.fillStyle="#3d4760";ctx.font="11px 'Noto Sans JP',sans-serif";ctx.textAlign="right";
    ctx.fillText(lbl.length>6?lbl.slice(0,6)+"…":lbl,pad.l-4,rowY+rowH/2+4);

    datasets.forEach((d,di)=>{
      const val=d.data[li]||0;
      const ratio=Math.min(val/maxV,1);
      const bw=cW*ratio;
      const y=rowY+(rowH-barH*ds)/2+di*barH;
      const c=d.colors?d.colors[li]:d.color||"#60a5fa";
      ctx.fillStyle=c;
      ctx.beginPath();ctx.roundRect(pad.l,y,bw,barH,2);ctx.fill();
      // 値表示
      if(bw>20){ctx.fillStyle="#fff";ctx.font="9px 'Outfit',sans-serif";ctx.textAlign="left";ctx.fillText(val+(unit||""),pad.l+bw-24,y+barH-2);}
    });
  });

  // 凡例
  let lx=pad.l;
  datasets.forEach((d,di)=>{
    const c=d.colors?d.colors[0]:d.color||"#60a5fa";
    ctx.fillStyle=c;ctx.fillRect(lx,6,10,10);
    ctx.fillStyle="#3d4760";ctx.font="10px 'Noto Sans JP',sans-serif";ctx.textAlign="left";
    ctx.fillText(d.label,lx+13,15);
    lx+=ctx.measureText(d.label).width+30;
  });
}

// ─ ALERT ─
function getAlerts(){
  const alerts=[];
  const d=mode==="mine"?stores.filter(s=>s.sv===mySV):stores;

  d.forEach(s=>{
    const mp=s.見込み達成率||0;
    const t=tasks.find(t=>t.store===s.name)||{};

    // 売上アラート：着地見込みが100%未満
    if(mp>0&&mp<100){
      alerts.push({type:"sales",lv:mp<80?"red":"amb",store:s.name,sv:s.sv,
        label:`${s.name} 見込み${mp}%`,msg:`着地見込み${mp}%`});
    }

    // 施策アラート：施策・次回予約特典・スタッフMTG・オーナーMTGが全て未入力
    const hasAny=t.施策||t.次回予約特典||t.ミニモ導入||t.スタッフMTG||t.オーナーMTG||t.HPBミーティング||t.店舗集計分析;
    if(!hasAny){
      alerts.push({type:"task",lv:"amb",store:s.name,sv:s.sv,
        label:`${s.name}`,msg:"施策未入力"});
    }
  });

  return alerts.sort((a,b)=>a.lv==="red"&&b.lv!=="red"?-1:b.lv==="red"&&a.lv!=="red"?1:0);
}

function updateAlertBadge(){
  const area=document.getElementById("sb-alert-area");
  const list=document.getElementById("sb-alert-list");
  if(!area||!list)return;

  const alerts=getAlerts();
  if(!alerts.length){area.style.display="none";return;}

  area.style.display="";
  const salesAlerts=alerts.filter(a=>a.type==="sales");
  const taskAlerts=alerts.filter(a=>a.type==="task");

  let html="";
  if(salesAlerts.length){
    html+=`<div style="font-size:10.5px;color:#fca5a5;font-weight:700;margin-bottom:2px">📉 着地未達見込み ${salesAlerts.length}件</div>`;

      `<div style="font-size:11px;color:rgba(255,255,255,.6);padding-left:8px;cursor:pointer" onclick="filterSV('${a.sv}');showView('stores',document.getElementById('nav-stores'))">
        <span style="color:${a.lv==='red'?'#fca5a5':'#fcd34d'}">●</span> ${a.label}

    html+=taskAlerts.slice(0,5).map(a=>

        <div style="font-size:12px;font-weight:700;margin-bottom:10px">スタッフ詳細</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="border-bottom:1px solid var(--bdr)">
            <th style="text-align:left;padding:4px 0;color:var(--ink3)">スタッフ</th>
            <th style="text-align:right;padding:4px 0;color:var(--ink3)">件数</th>
            <th style="text-align:right;padding:4px 0;color:var(--ink3)">売上</th>
          </tr></thead>
          <tbody>${staff.map(s=>`<tr style="border-bottom:1px solid var(--bdr2)">
            <td style="padding:5px 0">${s.name}</td>
            <td style="text-align:right;color:var(--ink2)">${s.count}</td>
            <td style="text-align:right;font-weight:600">${fm(s.sales)}</td>
          </tr>`).join("")}</tbody>
        </table>
      </div>
    </div>

    ${(d.kubunSummary||[]).length>0?`
    <div style="background:var(--sur);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-top:16px">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px">区分別サマリー（クーポン・割引・物販など）</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:1px solid var(--bdr)">
          <th style="text-align:left;padding:4px 0;color:var(--ink3)">区分</th>
          <th style="text-align:right;padding:4px 0;color:var(--ink3)">件数</th>
          <th style="text-align:right;padding:4px 0;color:var(--ink3)">金額</th>
        </tr></thead>
        <tbody>${(d.kubunSummary||[]).map(k=>{
          const isCoupon=k.kubun.includes("クーポン")||k.kubun.includes("割引")||k.sales<0;
          return`<tr style="border-bottom:1px solid var(--bdr2)${isCoupon?";background:var(--amb2)":""}">
            <td style="padding:5px 0;font-weight:${isCoupon?700:400}">${k.kubun}${isCoupon?" 🏷":""}${k.kubun==="施術"?" ✓":""}</td>
            <td style="text-align:right;color:var(--ink2)">${k.count}</td>
            <td style="text-align:right;font-weight:600;color:${k.sales<0?"var(--red)":"inherit"}">${k.sales<0?"-":""}${fm(Math.abs(k.sales))}</td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>`:""}
    `;

  // 月別売上グラフ
  _destroyChart("sales");
  _rptCharts["sales"]=new Chart(document.getElementById("rpt-c-sales"),{
    type:"bar",
    data:{labels,datasets:[{label:"売上",data:monthly.map(m=>m.sales),backgroundColor:"rgba(37,99,235,.7)",borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fm(v)},grid:{color:"rgba(0,0,0,.05)"}}}}
  });

  // 客単価・施術数
  _destroyChart("unit");
  _rptCharts["unit"]=new Chart(document.getElementById("rpt-c-unit"),{
    type:"bar",
    data:{labels,datasets:[
      {label:"施術数",data:monthly.map(m=>m.serviceCount),backgroundColor:"rgba(124,58,237,.5)",borderRadius:4,yAxisID:"y1"},
      {label:"客単価",data:monthly.map(m=>m.unitPrice),type:"line",borderColor:"#c2410c",backgroundColor:"rgba(194,65,12,.1)",pointRadius:4,yAxisID:"y2",tension:.3}
    ]},
    options:{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{size:10}}}},scales:{
      y1:{position:"left",ticks:{stepSize:1},grid:{color:"rgba(0,0,0,.05)"}},
      y2:{position:"right",ticks:{callback:v=>v.toLocaleString()+"円"},grid:{display:false}}
    }}
  });

  // メニュー構成比（上位8件 + その他）
  _destroyChart("menu");
  const topMenus=menus.slice(0,8);
  const otherSales=menus.slice(8).reduce((s,m)=>s+m.sales,0);
  const menuLabels=[...topMenus.map(m=>m.name),...(otherSales>0?["その他"]:[])];
  const menuData=[...topMenus.map(m=>m.sales),...(otherSales>0?[otherSales]:[])];
  _rptCharts["menu"]=new Chart(document.getElementById("rpt-c-menu"),{
    type:"doughnut",
    data:{labels:menuLabels,datasets:[{data:menuData,backgroundColor:CHART_COLORS,borderWidth:1}]},
    options:{responsive:false,plugins:{legend:{display:false}}}
  });
  const menuTotalSales=menuData.reduce((s,v)=>s+v,0);
  document.getElementById("rpt-menu-legend").innerHTML=menuLabels.map((l,i)=>
    `<div style="display:flex;align-items:center;gap:5px">
      <span style="width:8px;height:8px;border-radius:2px;background:${CHART_COLORS[i%CHART_COLORS.length]};flex-shrink:0"></span>
      <span style="color:var(--ink2)">${l}</span>
      <span style="color:var(--ink3);margin-left:auto">${menuTotalSales>0?Math.round(menuData[i]/menuTotalSales*100):0}%</span>
    </div>`
  ).join("");

  // スタッフ別売上（上位10件）
  _destroyChart("staff");
  const topStaff=staff.slice(0,10);
  _rptCharts["staff"]=new Chart(document.getElementById("rpt-c-staff"),{
    type:"bar",
    data:{labels:topStaff.map(s=>s.name),datasets:[{label:"売上",data:topStaff.map(s=>s.sales),backgroundColor:"rgba(8,145,178,.65)",borderRadius:4}]},
    options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fm(v)},grid:{color:"rgba(0,0,0,.05)"}}}}
  });
}
</script>
</body>
</html>
